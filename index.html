<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Álbum Copa 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800..900&family=Space+Mono:wght@400;700&display=swap');
:root{--pitch-dk:#043d1c;--gold:#f4c430;--ink:#0c1b12;--paper:#f5f3ea;--line:rgba(255,255,255,.16);--have:#1fae5a;--rep:#f4c430;--miss:rgba(255,255,255,.09);}
*{box-sizing:border-box}body{margin:0;font-family:'Space Mono',monospace;color:var(--paper);background:linear-gradient(160deg,var(--pitch-dk),#043d1c 60%,#022a13);min-height:100vh;padding:16px}
#app{max-width:820px;margin:0 auto}h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:900;font-size:clamp(24px,6vw,36px);margin:0 0 8px}h1 .acc{color:var(--gold)}.sub{font-size:11px;opacity:.55;margin-bottom:14px}
.auth-box{background:rgba(0,0,0,.3);border:1px solid var(--line);border-radius:12px;padding:20px;max-width:400px;margin:60px auto}
.auth-box h2{color:var(--gold);margin:0 0 14px}.auth-box input{width:100%;margin:8px 0;background:rgba(0,0,0,.3);border:1px solid var(--line);color:var(--paper);border-radius:8px;padding:11px;font-family:'Space Mono',monospace;font-size:13px}
.auth-box button{width:100%;margin-top:12px;background:var(--gold);color:var(--ink);border:none;border-radius:8px;padding:11px;font-weight:700;cursor:pointer}.auth-box button:hover{filter:brightness(.95)}.toggle{font-size:12px;opacity:.7;margin-top:12px;text-align:center}.toggle a{color:var(--gold);cursor:pointer;text-decoration:underline}
.tabs{display:flex;gap:8px;margin:16px 0;flex-wrap:wrap}.tabs button{background:rgba(0,0,0,.22);border:1px solid var(--line);color:var(--paper);border-radius:8px;padding:9px 13px;cursor:pointer;font-family:'Space Mono',monospace;font-weight:700;font-size:12px}.tabs button.active{background:var(--gold);color:var(--ink)}
.tab-content{display:none}.tab-content.active{display:block}
.top{display:flex;gap:10px;align-items:center;margin:12px 0;flex-wrap:wrap}.tot{font-family:'Bricolage Grotesque',sans-serif;font-weight:900;font-size:20px}.tot small{font-size:12px;opacity:.6}.bar{flex:1;min-width:120px;height:9px;border-radius:6px;background:rgba(0,0,0,.3)}.bar span{display:block;height:100%;background:linear-gradient(90deg,#1fae5a,#f4c430)}
.grp{margin-top:18px}.grp-h{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:2px;opacity:.7;border-bottom:1px solid var(--line);padding-bottom:5px;margin-bottom:12px}
.team{margin-bottom:14px}.team-h{display:flex;align-items:center;gap:9px;margin-bottom:7px}.badge{background:var(--gold);color:var(--ink);font-weight:700;font-size:11px;padding:2px 7px;border-radius:5px}.team-name{font-weight:700;font-size:14px}.team-prog{font-size:11px;opacity:.6;margin-left:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(50px,1fr));gap:5px}
.cell{aspect-ratio:1;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;cursor:pointer;user-select:none;-webkit-user-select:none;background:var(--miss);position:relative;transition:transform .08s}
.cell:hover{transform:translateY(-2px)}.cell.have{background:var(--have);color:#042}.cell.rep{background:var(--rep);color:#3a2c00}.cell.rep::after{content:"×"attr(data-c);position:absolute;top:-5px;right:-5px;background:var(--ink);color:var(--gold);font-size:9px;border-radius:9px;padding:1px 4px}
button{font-family:'Space Mono',monospace;font-weight:700;border:none;border-radius:9px;padding:9px 13px;cursor:pointer;font-size:12px}.btn-gold{background:var(--gold);color:var(--ink)}.btn-sec{background:rgba(0,0,0,.22);color:var(--paper);border:1px solid var(--line)}.btn-danger{background:#c41e3a;color:var(--paper)}
.note{font-size:11px;opacity:.5;margin-top:12px}input{background:rgba(0,0,0,.25);border:1px solid var(--line);color:var(--paper);border-radius:9px;padding:9px 11px;font-family:'Space Mono',monospace;font-size:13px}
.log-item{background:rgba(0,0,0,.2);border:1px solid var(--line);border-radius:9px;padding:12px;margin:8px 0;font-size:12px}
.log-team{font-weight:700;color:var(--gold);margin-bottom:4px}
.log-info{opacity:.7;font-size:11px}
.trade-box{background:rgba(31,174,90,.1);border:1px solid var(--have);border-radius:9px;padding:12px;margin:12px 0}
.trade-box .user{font-weight:700;color:var(--gold);margin-bottom:8px}
.trade-item{font-size:12px;margin:6px 0}
.collab-item{background:rgba(0,0,0,.2);border:1px solid var(--line);border-radius:9px;padding:12px;margin:8px 0;display:flex;justify-content:space-between;align-items:center}
.collab-name{font-weight:700}
.album-item{background:rgba(0,0,0,.2);border:1px solid var(--line);border-radius:9px;padding:12px;margin:8px 0;cursor:pointer}
.album-item:hover{background:rgba(0,0,0,.3)}
.album-title{font-weight:700;color:var(--gold);margin-bottom:4px}
.album-info{font-size:11px;opacity:.6}
</style>
</head>
<body>
<div id="app"><div style="text-align:center;padding:40px;opacity:.6">Carregando…</div></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPABASE_URL = "https://fektmbitypzwsgfiriyk.supabase.co";
const SUPABASE_KEY = "sb_publishable_qIXLVOOYRI4oi129YzR9dw_I-8cuW_V";

const TEAMS=[
  ['FWC','Abertura','FWC',20],
  ['A','México','MEX',20],['A','África do Sul','RSA',20],['A','Coreia do Sul','KOR',20],['A','Rep. Tcheca','CZE',20],
  ['B','Canadá','CAN',20],['B','Bósnia','BIH',20],['B','Catar','QAT',20],['B','Suíça','SUI',20],
  ['C','Brasil','BRA',20],['C','Marrocos','MAR',20],['C','Haiti','HAI',20],['C','Escócia','SCO',20],
  ['D','Estados Unidos','USA',20],['D','Paraguai','PAR',20],['D','Austrália','AUS',20],['D','Turquia','TUR',20],
  ['E','Alemanha','GER',20],['E','Curaçao','CUW',20],['E','Costa do Marfim','CIV',20],['E','Equador','ECU',20],
  ['F','Holanda','NED',20],['F','Japão','JPN',20],['F','Suécia','SWE',20],['F','Tunísia','TUN',20],
  ['G','Bélgica','BEL',20],['G','Egito','EGY',20],['G','Irã','IRN',20],['G','Nova Zelândia','NZL',20],
  ['H','Espanha','ESP',20],['H','Cabo Verde','CPV',20],['H','Arábia Saudita','KSA',20],['H','Uruguai','URU',20],
  ['I','França','FRA',20],['I','Senegal','SEN',20],['I','Iraque','IRQ',20],['I','Noruega','NOR',20],
  ['J','Argentina','ARG',20],['J','Argélia','ALG',20],['J','Áustria','AUT',20],['J','Jordânia','JOR',20],
  ['K','Portugal','POR',20],['K','Congo','COD',20],['K','Uzbequistão','UZB',20],['K','Colômbia','COL',20],
  ['L','Inglaterra','ENG',20],['L','Croácia','CRO',20],['L','Gana','GHA',20],['L','Panamá','PAN',20],
  ['CC','Coca-Cola','CC',14],
].map(t=>({group:t[0],name:t[1],code:t[2],count:t[3]}));

let sb, user=null, currentAlbum=null, owned={}, allUsers={}, allAlbums={}, allCollab={};
const app=document.getElementById('app');

function toast(m){
  let t=document.querySelector('[data-toast]');
  if(!t){t=document.createElement('div');t.setAttribute('data-toast','1');t.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0c1b12;color:#f4c430;padding:10px 18px;border-radius:10px;font-size:13px;border:1px solid #f4c430;z-index:999';document.body.appendChild(t);}
  t.textContent=m;t.style.opacity='1';setTimeout(()=>t.style.opacity='0',2000);
}

async function init(){
  sb=createClient(SUPABASE_URL,SUPABASE_KEY);
  const {data:{session}}=await sb.auth.getSession().catch(()=>({data:{session:null}}));
  if(session){user=session.user;await loadData();}
  render();
}

async function signup(email,password,name){
  try{
    const {data,error}=await sb.auth.signUp({email,password});
    if(error)throw error;
    await sb.from('profiles').insert({id:data.user.id,name});
    user=data.user;
    await loadData();
    render();
  }catch(e){toast('Erro: '+e.message);}
}

async function login(email,password){
  try{
    const {data,error}=await sb.auth.signInWithPassword({email,password});
    if(error)throw error;
    user=data.user;
    await loadData();
    render();
  }catch(e){toast('Erro: '+e.message);}
}

async function logout(){
  await sb.auth.signOut();
  user=null;
  currentAlbum=null;
  render();
}

async function loadData(){
  try{
    const {data:owned}=await sb.from('albums').select('*').eq('owner_id',user.id);
    const {data:collab}=await sb.from('album_collaborators').select('album_id').eq('user_id',user.id);
    const collabIds=collab?collab.map(c=>c.album_id):[];
    let allAlbumsData=[...(owned||[])];
    if(collabIds.length>0){
      const {data:collabAlbums}=await sb.from('albums').select('*').in('id',collabIds);
      allAlbumsData=[...allAlbumsData,...(collabAlbums||[])];
    }
    currentAlbum=allAlbumsData&&allAlbumsData[0]?allAlbumsData[0]:null;
    if(currentAlbum)await loadStickers();
  }catch(e){console.error(e);}
}

async function loadStickers(){
  try{
    const {data}=await sb.from('stickers').select('*').eq('album_id',currentAlbum.id);
    owned={};
    (data||[]).forEach(r=>{if(r.count>0)owned[r.sticker_code]=r.count;});
  }catch(e){console.error(e);}
}

async function createAlbum(name){
  try{
    const {data,error}=await sb.from('albums').insert({owner_id:user.id,name}).select().single();
    if(error)throw error;
    currentAlbum=data;
    owned={};
    render();
    toast('Álbum criado!');
  }catch(e){toast('Erro: '+e.message);}
}

async function deleteAlbum(){
  if(!confirm('Tem certeza que quer deletar este álbum?'))return;
  try{
    await sb.from('sticker_log').delete().eq('album_id',currentAlbum.id);
    await sb.from('stickers').delete().eq('album_id',currentAlbum.id);
    await sb.from('album_collaborators').delete().eq('album_id',currentAlbum.id);
    await sb.from('albums').delete().eq('id',currentAlbum.id);
    currentAlbum=null;
    owned={};
    render();
    toast('Álbum deletado!');
  }catch(e){toast('Erro: '+e.message);}
}

async function editAlbumName(){
  const newName=prompt('Novo nome:',currentAlbum.name);
  if(!newName||newName===currentAlbum.name)return;
  try{
    await sb.from('albums').update({name:newName}).eq('id',currentAlbum.id);
    currentAlbum.name=newName;
    render();
    toast('Nome alterado!');
  }catch(e){toast('Erro: '+e.message);}
}

async function bump(code,n,dir){
  const k=code+'-'+n;
  const nv=Math.max(0,(owned[k]||0)+dir);
  owned[k]=nv;
  render();
  try{
    if(nv===0)await sb.from('stickers').delete().eq('album_id',currentAlbum.id).eq('sticker_code',k);
    else await sb.from('stickers').upsert({album_id:currentAlbum.id,sticker_code:k,count:nv});
    await sb.from('sticker_log').insert({album_id:currentAlbum.id,sticker_code:k,action:dir>0?'add':'remove',user_id:user.id});
  }catch(e){toast('Erro ao salvar');}
}

async function inviteCollaborator(){
  const email=prompt('Email do colaborador:');
  if(!email)return;
  try{
    const {data:profile}=await sb.from('profiles').select('id').eq('id',(await sb.auth.admin.getUserById(email)).data?.user?.id).single().catch(()=>({data:null}));
    if(!profile){toast('Usuário não encontrado');return;}
    await sb.from('album_collaborators').insert({album_id:currentAlbum.id,user_id:profile.id});
    toast('Colaborador adicionado!');
    render();
  }catch(e){toast('Erro: '+e.message);}
}

async function removeCollaborator(userId){
  try{
    await sb.from('album_collaborators').delete().eq('album_id',currentAlbum.id).eq('user_id',userId);
    toast('Colaborador removido!');
    render();
  }catch(e){toast('Erro: '+e.message);}
}

async function loadMarketplace(){
  try{
    const {data:users}=await sb.from('profiles').select('*');
    const {data:albums}=await sb.from('albums').select('*');
    allUsers={};users.forEach(u=>allUsers[u.id]=u);
    allAlbums={};albums.forEach(a=>allAlbums[a.id]=a);
  }catch(e){console.error(e);}
}

async function renderMarketplace(){
  await loadMarketplace();
  let html='<h2>🔄 Trocas</h2>';
  const myReps=Object.entries(owned).filter(([k,v])=>v>1).map(([k])=>k);
  
  for(const [id,album] of Object.entries(allAlbums)){
    if(id===currentAlbum.id)continue;
    try{
      const {data:sticks}=await sb.from('stickers').select('sticker_code').eq('album_id',id).gt('count',1);
      const theirReps=(sticks||[]).map(s=>s.sticker_code);
      const owner=allUsers[album.owner_id];
      
      const myNeed=myReps.filter(r=>theirReps.includes(r));
      const theyNeed=theirReps.filter(r=>myReps.includes(r));
      
      if(myNeed.length>0||theyNeed.length>0){
        html+=`<div class="trade-box"><div class="user">${owner.name} — ${album.name}</div>`;
        if(myNeed.length>0)html+=`<div class="trade-item">🔴 Você pode dar: ${myNeed.join(', ')}</div>`;
        if(theyNeed.length>0)html+=`<div class="trade-item">🟢 Você pode receber: ${theyNeed.join(', ')}</div>`;
        html+=`</div>`;
      }
    }catch(e){}
  }
  
  document.getElementById('market').innerHTML=html||'<p style="opacity:.6">Nenhuma troca disponível</p>';
}

async function renderHistory(){
  try{
    const {data:logs}=await sb.from('sticker_log').select('*').eq('album_id',currentAlbum.id).order('created_at',{ascending:false}).limit(500);
    const {data:users}=await sb.from('profiles').select('*');
    const userMap={};users.forEach(u=>userMap[u.id]=u.name);
    
    const grouped={};
    (logs||[]).forEach(l=>{
      const code=l.sticker_code.split('-')[0];
      if(!grouped[code])grouped[code]=[];
      grouped[code].push(l);
    });
    
    let html='<h2>🕘 Histórico</h2>';
    Object.entries(grouped).forEach(([code,items])=>{
      const team=TEAMS.find(t=>t.code===code);
      html+=`<div class="log-item"><div class="log-team">${code} - ${team?.name||'?'}</div>`;
      html+=`<div class="log-info">${items.length} mudança${items.length>1?'s':''} por ${userMap[items[0].user_id]||'?'} • Última: ${new Date(items[0].created_at).toLocaleDateString('pt-BR')}</div></div>`;
    });
    
    document.getElementById('history').innerHTML=html||'<p style="opacity:.6">Sem histórico</p>';
  }catch(e){console.error(e);}
}

async function renderAlbums(){
  try{
    const {data:owned}=await sb.from('albums').select('*').eq('owner_id',user.id);
    const {data:collab}=await sb.from('album_collaborators').select('album_id').eq('user_id',user.id);
    const collabIds=collab?collab.map(c=>c.album_id):[];
    let allAlbumsData=[...(owned||[])];
    if(collabIds.length>0){
      const {data:collabAlbums}=await sb.from('albums').select('*').in('id',collabIds);
      allAlbumsData=[...allAlbumsData,...(collabAlbums||[])];
    }
    
    let html='<h2>Meus Álbuns</h2>';
    allAlbumsData.forEach(a=>{
      const isOwner=a.owner_id===user.id;
      html+=`<div class="album-item" onclick="selectAlbum('${a.id}')">
        <div class="album-title">${a.name} ${isOwner?'(dono)':'(colaborador)'}</div>
        <div class="album-info">Criado em ${new Date(a.created_at).toLocaleDateString('pt-BR')}</div>
      </div>`;
    });
    
    document.getElementById('albums').innerHTML=html;
  }catch(e){console.error(e);}
}

async function renderCollaborators(){
  try{
    const {data:collab}=await sb.from('album_collaborators').select('user_id').eq('album_id',currentAlbum.id);
    const {data:users}=await sb.from('profiles').select('*').in('id',collab.map(c=>c.user_id));
    
    let html='<h2>👥 Colaboradores</h2>';
    users.forEach(u=>{
      html+=`<div class="collab-item">
        <div class="collab-name">${u.name}</div>
        <button class="btn-danger" style="padding:6px 10px;font-size:11px" onclick="removeCollab('${u.id}')">Remover</button>
      </div>`;
    });
    
    document.getElementById('collab').innerHTML=html;
  }catch(e){console.error(e);}
}

window.removeCollab=(id)=>removeCollaborator(id);
window.selectAlbum=async(id)=>{
  try{
    const {data:album}=await sb.from('albums').select('*').eq('id',id).single();
    currentAlbum=album;
    await loadStickers();
    render();
  }catch(e){toast('Erro ao carregar álbum');}
};

function totals(){
  let o=0,total=0;
  TEAMS.forEach(t=>{if(t.code==='CC')return;total+=t.count;for(let i=1;i<=t.count;i++)if(owned[t.code+'-'+i])o++;});
  return{owned:o,total};
}

function renderAuth(){
  let mode='login';
  app.innerHTML=`<div class="auth-box">
    <h2>Login</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Senha">
    <input id="name" type="text" placeholder="Seu nome" style="display:none">
    <button id="submit">Entrar</button>
    <div class="toggle">Novo? <a id="toggle">Criar conta</a></div>
    <div class="toggle">Esqueceu? <a id="forgot">Reset senha</a></div>
  </div>`;
  
  document.getElementById('toggle').onclick=()=>{
    mode=mode==='login'?'signup':'login';
    document.querySelector('h2').textContent=mode==='login'?'Login':'Criar conta';
    document.getElementById('name').style.display=mode==='signup'?'block':'none';
  };
  document.getElementById('submit').onclick=()=>{
    const e=document.getElementById('email').value;
    const p=document.getElementById('pass').value;
    if(mode==='signup'){
      const n=document.getElementById('name').value;
      if(!n){toast('Nome obrigatório');return;}
      signup(e,p,n);
    }else login(e,p);
  };
  document.getElementById('forgot').onclick=()=>{
    const email=prompt('Digite seu email:');
    if(!email){toast('Email obrigatório');return;}
    sb.auth.resetPasswordForEmail(email).then(()=>toast('Link enviado!')).catch(e=>toast('Erro: '+e.message));
  };
}

function renderAlbumList(){
  app.innerHTML=`<h1>Meus <span class="acc">Álbuns</span></h1>
    <button class="btn-gold" id="newBtn" style="margin-bottom:20px">+ Novo Álbum</button>
    <div id="albumsList"></div>`;
  
  setTimeout(()=>{
    const btn=document.getElementById('newBtn');
    if(btn)btn.onclick=()=>{
      const name=prompt('Nome do álbum:');
      if(name)createAlbum(name);
    };
  },50);
  
  loadAlbumsMenu();
}

async function loadAlbumsMenu(){
  try{
    const {data:owned}=await sb.from('albums').select('*').eq('owner_id',user.id);
    const {data:collab}=await sb.from('album_collaborators').select('album_id').eq('user_id',user.id);
    const collabIds=collab?collab.map(c=>c.album_id):[];
    let allAlbumsData=[...(owned||[])];
    if(collabIds.length>0){
      const {data:collabAlbums}=await sb.from('albums').select('*').in('id',collabIds);
      allAlbumsData=[...allAlbumsData,...(collabAlbums||[])];
    }
    
    let html='';
    if(allAlbumsData.length===0){
      html='<p style="opacity:.6">Nenhum álbum ainda. Crie um novo!</p>';
    }else{
      allAlbumsData.forEach(a=>{
        const isOwner=a.owner_id===user.id;
        html+=`<div class="album-item" onclick="selectAlbumFromMenu('${a.id}')">
          <div class="album-title">${a.name} ${isOwner?'(dono)':'(colaborador)'}</div>
          <div class="album-info">Criado em ${new Date(a.created_at).toLocaleDateString('pt-BR')}</div>
        </div>`;
      });
    }
    document.getElementById('albumsList').innerHTML=html;
  }catch(e){console.error(e);}
}

window.selectAlbumFromMenu=async(id)=>{
  try{
    const {data:album}=await sb.from('albums').select('*').eq('id',id).single();
    currentAlbum=album;
    await loadStickers();
    render();
  }catch(e){toast('Erro ao carregar álbum');}
};

function render(){
  if(!user){renderAuth();return;}
  if(!currentAlbum){renderAlbumList();return;}
  
  const {owned:o,total}=totals();
  const pct=total?Math.round(o/total*100):0;
  const groups=[...new Set(TEAMS.map(t=>t.group))];
  const isOwner=currentAlbum.owner_id===user.id;
  
  let html=`<h1>Álbum <span class="acc">Copa 2026</span></h1>
    <div class="sub">${currentAlbum.name} <a id="editBtn" style="color:var(--gold);cursor:pointer;font-size:11px;opacity:.7">✏️</a></div>
    <button class="btn-sec" style="margin-bottom:8px;margin-right:8px" id="logoutBtn">Logout</button>
    <button class="btn-sec" style="margin-bottom:8px;margin-right:8px" id="backBtn">← Álbuns</button>
    <button class="btn-sec" style="margin-bottom:8px" id="inviteBtn">👥 Adicionar</button>
    ${isOwner?'<button class="btn-danger" style="margin-bottom:8px" id="deleteBtn">🗑️ Deletar</button>':''}
    
    <div class="tabs">
      <button class="tab-btn" data-tab="albums">📚 Meus Álbuns</button>
      <button class="tab-btn active" data-tab="album">📊 Álbum</button>
      <button class="tab-btn" data-tab="market">🔄 Trocas</button>
      <button class="tab-btn" data-tab="history">🕘 Histórico</button>
      ${isOwner?'<button class="tab-btn" data-tab="collab">👥 Colaboradores</button>':''}
    </div>
    
    <div id="albums" class="tab-content"><p style="opacity:.6">Carregando…</p></div>
    <div id="album" class="tab-content active">
      <div style="margin-bottom:14px">
        <input type="text" id="searchTeam" placeholder="🔍 Buscar time..." style="width:100%;max-width:300px;margin-bottom:10px">
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="tab-btn active" data-filter="todas" style="flex:1;min-width:80px">Todas</button>
          <button class="tab-btn" data-filter="faltam">Faltam</button>
          <button class="tab-btn" data-filter="repetidas">Repetidas</button>
        </div>
      </div>
      
      <div style="background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:9px;padding:12px;margin-bottom:14px;font-size:12px">
        <div style="margin-bottom:6px"><span style="color:var(--gold);font-weight:700">📊 Resumo:</span></div>
        <div style="opacity:.8">🔴 Faltam: <strong id="countMissing">0</strong> figurinhas</div>
        <div style="opacity:.8">🟡 Repetidas: <strong id="countRepeated">0</strong> figurinhas</div>
      </div>
      
      <div class="top">
        <div class="tot">${o}<small>/${total} · ${pct}%</small></div>
        <div class="bar" style="flex:1"><span style="width:${pct}%;height:100%;background:linear-gradient(90deg,#1fae5a,#f4c430);transition:width .4s"></span></div>
      </div>
      
      ${groups.map(g=>{
        const tg=TEAMS.filter(t=>t.group===g);
        return `<div class="grp">
          <div class="grp-h">${g==='FWC'?'★ Abertura':g==='CC'?'◎ Coca-Cola':'Grupo '+g}</div>
          ${tg.map(t=>{
            let have=0,missing=0,repeated=0;
            for(let i=1;i<=t.count;i++){
              const c=owned[t.code+'-'+i]||0;
              if(c===0)missing++;
              else if(c>1)repeated+=c-1;
              if(c>0)have++;
            }
            return `<div class="team" data-team="${t.name.toLowerCase()}" data-missing="${missing}" data-repeated="${repeated}">
              <div class="team-h"><span class="badge">${t.code}</span><span class="team-name">${t.name}</span><span class="team-prog">${have}/${t.count}</span></div>
              <div class="grid">${Array.from({length:t.count},(_,i)=>{
                const c=owned[t.code+'-'+(i+1)]||0;
                const cls=c>1?'rep':c===1?'have':'miss';
                return `<div class="cell ${cls}" data-code="${t.code}" data-n="${i+1}" ${c>1?`data-c="${c-1}"`:''}>${i+1}</div>`;
              }).join('')}</div>
            </div>`;
          }).join('')}
        </div>`;
      }).join('')}
    </div>
    
    <div id="market" class="tab-content"><p style="opacity:.6">Carregando trocas…</p></div>
    <div id="history" class="tab-content"><p style="opacity:.6">Carregando histórico…</p></div>
    ${isOwner?'<div id="collab" class="tab-content"><p style="opacity:.6">Carregando…</p></div>':''}
  `;
  
  app.innerHTML=html;
  
  document.getElementById('logoutBtn').onclick=logout;
  document.getElementById('backBtn').onclick=()=>{currentAlbum=null;render();};
  document.getElementById('inviteBtn').onclick=inviteCollaborator;
  document.getElementById('editBtn').onclick=editAlbumName;
  if(isOwner)document.getElementById('deleteBtn').onclick=deleteAlbum;
  
  const searchInput=document.getElementById('searchTeam');
  if(searchInput){
    searchInput.onkeyup=()=>{
      const query=searchInput.value.toLowerCase();
      const activeFilter=document.querySelector('[data-filter].active')?.dataset.filter||'todas';
      document.querySelectorAll('.team').forEach(t=>{
        const name=t.dataset.team;
        const missing=+t.dataset.missing;
        const repeated=+t.dataset.repeated;
        let show=name.includes(query);
        if(activeFilter==='faltam')show=show&&missing>0;
        else if(activeFilter==='repetidas')show=show&&repeated>0;
        t.style.display=show?'block':'none';
      });
      // Esconde grupos vazios
      document.querySelectorAll('.grp').forEach(grp=>{
        const hasVisibleTeams=grp.querySelector('.team[style="display: block"], .team:not([style*="display: none"])');
        grp.style.display=hasVisibleTeams?'block':'none';
      });
    };
  }
  
  document.querySelectorAll('[data-filter]').forEach(btn=>{
    btn.onclick=()=>{
      document.querySelectorAll('[data-filter]').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const filter=btn.dataset.filter;
      const query=searchInput?.value.toLowerCase()||'';
      document.querySelectorAll('.team').forEach(t=>{
        const name=t.dataset.team;
        const missing=+t.dataset.missing;
        const repeated=+t.dataset.repeated;
        let show=name.includes(query);
        if(filter==='faltam')show=show&&missing>0;
        else if(filter==='repetidas')show=show&&repeated>0;
        t.style.display=show?'block':'none';
      });
      // Esconde grupos vazios
      document.querySelectorAll('.grp').forEach(grp=>{
        const hasVisibleTeams=grp.querySelector('.team[style="display: block"], .team:not([style*="display: none"])');
        grp.style.display=hasVisibleTeams?'block':'none';
      });
    };
  });
  
  let totalMissing=0,totalRepeated=0;
  document.querySelectorAll('.team').forEach(t=>{
    totalMissing+=+t.dataset.missing;
    totalRepeated+=+t.dataset.repeated;
  });
  document.getElementById('countMissing').textContent=totalMissing;
  document.getElementById('countRepeated').textContent=totalRepeated;
  
  document.querySelectorAll('.tab-btn').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById(b.dataset.tab).classList.add('active');
    if(b.dataset.tab==='albums')renderAlbums();
    if(b.dataset.tab==='market')renderMarketplace();
    if(b.dataset.tab==='history')renderHistory();
    if(b.dataset.tab==='collab')renderCollaborators();
  });
  
  let touchStart=null;
  document.querySelectorAll('.cell').forEach(c=>{
    const code=c.dataset.code;
    const n=+c.dataset.n;
    c.style.touchAction='none';
    c.addEventListener('touchstart',()=>{touchStart=Date.now();},false);
    c.addEventListener('touchend',(e)=>{
      if(touchStart && Date.now()-touchStart>400)bump(code,n,-1);
      else bump(code,n,+1);
      touchStart=null;
      e.preventDefault();
    },false);
    c.addEventListener('contextmenu',(e)=>{e.preventDefault();bump(code,n,-1);},false);
  });
}

init();
</script>
</body>
</html>
